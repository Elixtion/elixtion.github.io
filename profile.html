<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Profile — CrowdScout</title>
  <meta name="theme-color" content="#111312"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="lib/reliability.js"></script>
  <script src="lib/ui.js"></script>
</head>
<body>

<header class="cs-header">
  <a href="home.html" class="cs-header-brand">
    <span class="material-symbols-outlined" style="color:var(--surface-500);font-size:20px">arrow_back</span>
    <img src="https://raw.githubusercontent.com/Elixtion/elixtion.github.io/refs/heads/main/images/Untitled%20design%20(3).png" alt="CrowdScout"/>
    <span>Profile</span>
  </a>
  <button class="cs-btn cs-btn-ghost cs-btn-sm" onclick="signOut()">
    <span class="material-symbols-outlined" style="font-size:16px">logout</span> Sign Out
  </button>
</header>

<main class="cs-page" style="padding-top:20px">

  <div style="text-align:center;margin-bottom:24px" id="profileHeader">
    <div class="cs-skeleton" style="height:80px;width:80px;border-radius:50%;margin:0 auto 12px"></div>
    <div class="cs-skeleton" style="height:22px;width:50%;margin:0 auto 8px"></div>
    <div class="cs-skeleton" style="height:16px;width:35%;margin:0 auto"></div>
  </div>

  <div id="statsRow" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
    <div class="cs-skeleton" style="height:72px;border-radius:12px"></div>
    <div class="cs-skeleton" style="height:72px;border-radius:12px"></div>
    <div class="cs-skeleton" style="height:72px;border-radius:12px"></div>
  </div>

  <div class="cs-card" id="editForm" style="display:none">
    <h3 class="cs-section-title" style="margin-top:0">Edit Profile</h3>
    <div class="cs-field">
      <label class="cs-label">Display Name *</label>
      <input id="displayName" class="cs-input" maxlength="50"/>
    </div>
    <div class="cs-field">
      <label class="cs-label">FRC Team Number</label>
      <input id="teamNumber" class="cs-input" type="number" min="1" max="99999"/>
    </div>
    <div class="cs-field">
      <label class="cs-label">Role</label>
      <select id="role" class="cs-select">
        <option value="">—</option>
        <option value="student">Student</option>
        <option value="mentor">Mentor</option>
        <option value="volunteer">Volunteer</option>
        <option value="spectator">Spectator / Fan</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="cs-field">
      <label class="cs-label">Bio</label>
      <textarea id="bio" class="cs-textarea" rows="3" maxlength="200"></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="cs-btn cs-btn-secondary" style="flex:1" onclick="cancelEdit()">Cancel</button>
      <button class="cs-btn cs-btn-primary" style="flex:2" id="saveBtn" onclick="saveProfile()">
        <span class="material-symbols-outlined">save</span> Save
      </button>
    </div>
  </div>

  <div id="actionsSection" style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
    <button class="cs-btn cs-btn-secondary" style="width:100%" onclick="showEdit()">
      <span class="material-symbols-outlined">edit</span> Edit Profile
    </button>
    <a href="scout-history.html" class="cs-btn cs-btn-ghost" style="width:100%;justify-content:center">
      <span class="material-symbols-outlined">history</span> My Submissions
    </a>
    <a href="export.html" class="cs-btn cs-btn-ghost" style="width:100%;justify-content:center">
      <span class="material-symbols-outlined">download</span> Export My Data
    </a>
  </div>

  <div style="margin-top:32px;padding-top:20px;border-top:1px solid var(--surface-100)">
    <div style="font-size:0.8rem;color:var(--surface-400);margin-bottom:8px">Account</div>
    <button class="cs-btn cs-btn-danger cs-btn-sm" onclick="signOut()">
      <span class="material-symbols-outlined" style="font-size:16px">logout</span> Sign Out
    </button>
  </div>

</main>

<nav class="cs-mobile-nav">
  <a href="home.html"><span class="material-symbols-outlined">home</span>Home</a>
  <a href="scout.html"><span class="material-symbols-outlined">edit_note</span>Scout</a>
  <a href="events.html"><span class="material-symbols-outlined">event</span>Events</a>
  <a href="teams.html"><span class="material-symbols-outlined">groups</span>Teams</a>
  <a href="profile.html" class="active"><span class="material-symbols-outlined">person</span>Profile</a>
</nav>

<div id="cs-toast-container"></div>

<script>
let _session = null;
let _profile = null;

(async function init() {
  _session = await window.CS.auth.requireAuth("landing.html");
  if (!_session) return;
  await loadProfile();
})();

async function loadProfile() {
  _profile = await window.CS.profile.get(_session.user.id);
  const db = window.CS.db;
  const { data: subs } = await db.from("scout_submissions").select("id").eq("owner_id", _session.user.id);
  const { data: rel } = await db.from("scout_reliability").select("*").eq("user_id", _session.user.id).maybeSingle();

  const count = subs?.length ?? 0;
  const relScore = rel?.reliability_score ?? 1.0;
  const trustLevel = window.CS.reliability.getTrustLevel(count);
  const meta = _session.user.user_metadata || {};
  const avatarUrl = meta.avatar_url ||
    `https://api.dicebear.com/8.x/initials/svg?seed=${encodeURIComponent(_profile?.display_name || meta.full_name || "?")}`;

  document.getElementById("profileHeader").innerHTML = `
    <img src="${avatarUrl}" alt="avatar"
         style="height:80px;width:80px;border-radius:50%;object-fit:cover;border:3px solid var(--primary-700);margin:0 auto 12px;display:block"/>
    <div style="font-size:1.2rem;font-weight:800;color:var(--surface-950)">${_profile?.display_name || meta.full_name || "Scout"}</div>
    <div style="font-size:0.85rem;color:var(--surface-400);margin-top:2px">@${_profile?.username || "—"}</div>
    ${_profile?.team_number ? `<div style="margin-top:8px"><span class="cs-team-chip">Team ${_profile.team_number}</span></div>` : ""}
    ${_profile?.bio ? `<div style="margin-top:10px;font-size:0.85rem;color:var(--surface-600);max-width:320px;margin-inline:auto">${_profile.bio}</div>` : ""}
    ${!window.CS.profile.isComplete(_profile) ? `<div style="margin-top:10px"><a href="profile-setup.html" class="cs-btn cs-btn-primary cs-btn-sm">Complete Profile</a></div>` : ""}
  `;

  document.getElementById("statsRow").innerHTML = `
    <div class="cs-card" style="text-align:center;padding:14px">
      <div style="font-size:1.6rem;font-weight:800;color:var(--primary-500)">${count}</div>
      <div style="font-size:0.7rem;color:var(--surface-500);text-transform:uppercase;letter-spacing:.05em">Matches</div>
    </div>
    <div class="cs-card" style="text-align:center;padding:14px">
      <div style="font-size:1.3rem;font-weight:800">${(relScore*100).toFixed(0)}%</div>
      <div style="font-size:0.7rem;color:var(--surface-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Reliability</div>
      <div class="cs-reliability-bar"><div class="cs-reliability-fill" style="width:${Math.min(relScore*100,100)}%"></div></div>
    </div>
    <div class="cs-card" style="text-align:center;padding:14px">
      <div style="font-size:0.9rem;margin-bottom:2px">${window.CS.ui.trustBadge(trustLevel)}</div>
      <div style="font-size:0.7rem;color:var(--surface-500);text-transform:uppercase;letter-spacing:.05em">Trust</div>
    </div>
  `;
}

function showEdit() {
  document.getElementById("editForm").style.display = "";
  document.getElementById("actionsSection").style.display = "none";
  document.getElementById("displayName").value = _profile?.display_name || "";
  document.getElementById("teamNumber").value  = _profile?.team_number  || "";
  document.getElementById("role").value         = _profile?.role         || "";
  document.getElementById("bio").value          = _profile?.bio          || "";
}

function cancelEdit() {
  document.getElementById("editForm").style.display = "none";
  document.getElementById("actionsSection").style.display = "";
}

async function saveProfile() {
  const displayName = document.getElementById("displayName").value.trim();
  if (!displayName) { window.CS.ui.toast("Display name required.", "error"); return; }
  document.getElementById("saveBtn").disabled = true;
  const result = await window.CS.profile.upsert({
    id: _session.user.id,
    display_name: displayName,
    team_number: parseInt(document.getElementById("teamNumber").value) || null,
    role: document.getElementById("role").value,
    bio: document.getElementById("bio").value.trim(),
    profile_completed: true,
    updated_at: new Date().toISOString(),
  });
  document.getElementById("saveBtn").disabled = false;
  if (result) { window.CS.ui.toast("Saved!", "success"); cancelEdit(); await loadProfile(); }
  else window.CS.ui.toast("Save failed.", "error");
}

async function signOut() {
  await window.CS.auth.signOut();
  window.location.href = "landing.html";
}
</script>
</body>
</html>
