<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Teams — CrowdScout</title>
  <meta name="theme-color" content="#111312"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans:wght@400;500;600;700;900&display=swap"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="lib/config.js"></script>
  <script src="lib/tba.js"></script>
  <script src="lib/offline.js"></script>
  <script src="lib/ui.js"></script>
  <style>
    /* Event autocomplete */
    .ac-container { position:relative; }
    .ac-dropdown {
      position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:50;
      background:var(--surface-50);border:1px solid var(--surface-200);
      border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);
      max-height:260px;overflow-y:auto;
    }
    .ac-item {
      padding:10px 14px;cursor:pointer;font-size:0.85rem;
      display:flex;align-items:baseline;gap:8px;
      border-bottom:1px solid var(--surface-100);
    }
    .ac-item:last-child { border-bottom:none; }
    .ac-item:hover { background:var(--surface-100); }
    .ac-key { font-weight:700;color:var(--primary-500);flex-shrink:0;font-size:0.8rem; }
    .ac-name { color:var(--surface-700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .ac-loc { color:var(--surface-400);font-size:0.75rem;flex-shrink:0; }

    /* Index loading bar */
    #indexBar { height:2px;background:var(--primary-950);border-radius:1px;overflow:hidden;margin-bottom:10px;display:none }
    #indexFill { height:100%;background:var(--primary-500);width:0%;transition:width .3s; }
  </style>
</head>
<body>

<header class="cs-header">
  <a href="home.html" class="cs-header-brand">
    <img src="https://raw.githubusercontent.com/Elixtion/elixtion.github.io/refs/heads/main/images/Untitled%20design%20(3).png" alt="CrowdScout"/>
    <span>Teams</span>
  </a>
  <nav class="cs-nav">
    <a href="scout.html">Scout</a>
    <a href="events.html">Events</a>
    <a href="profile.html">Profile</a>
  </nav>
</header>

<main class="cs-page-wide" style="padding-top:16px">

  <!-- Offline notice -->
  <div id="offlineBanner" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:0.85rem;color:#f87171;align-items:center;gap:8px">
    <span class="material-symbols-outlined" style="font-size:18px">wifi_off</span>
    You're offline. Searches use cached data only.
  </div>

  <!-- Team index loading indicator -->
  <div id="indexBar"><div id="indexFill"></div></div>
  <div id="indexStatus" style="font-size:0.75rem;color:var(--surface-400);margin-bottom:10px;display:none"></div>

  <!-- Search row -->
  <div style="display:flex;gap:10px;margin-bottom:16px;align-items:flex-start;flex-wrap:wrap">
    <!-- Team search -->
    <div class="cs-search" style="flex:1;min-width:220px">
      <span class="material-symbols-outlined">search</span>
      <input id="teamSearch" class="cs-input" placeholder="Team number, name, city, state…"
             oninput="onSearch()" onkeydown="if(event.key==='Enter')doSearch()"/>
    </div>

    <!-- Event autocomplete -->
    <div class="cs-field" style="margin:0;min-width:220px;flex:1">
      <div class="ac-container" id="eventAC">
        <div class="cs-search">
          <span class="material-symbols-outlined">event</span>
          <input id="eventKeyInput" class="cs-input" placeholder="Key or search name (e.g. orlando)…"
                 autocapitalize="none" oninput="onEventSearch()" onkeydown="onEventKeydown(event)"
                 onblur="setTimeout(closeEventAC, 200)" onfocus="onEventSearch()"/>
        </div>
        <div id="eventACDropdown" class="ac-dropdown" style="display:none"></div>
      </div>
    </div>
  </div>

  <div id="resultsLabel" style="font-size:0.8rem;color:var(--surface-400);margin-bottom:10px"></div>

  <div id="teamsList">
    <div class="cs-empty" style="padding-top:60px">
      <span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:8px;color:var(--surface-300)">groups</span>
      Building team index… Search will be ready shortly.
    </div>
  </div>

  <div id="loadingState" style="display:none;text-align:center;padding:40px;color:var(--surface-400)">
    <span class="material-symbols-outlined" style="font-size:36px;display:block;margin-bottom:8px">hourglass_top</span>
    Loading…
  </div>

</main>

<nav class="cs-mobile-nav">
  <a href="home.html"><span class="material-symbols-outlined">home</span>Home</a>
  <a href="scout.html"><span class="material-symbols-outlined">edit_note</span>Scout</a>
  <a href="events.html"><span class="material-symbols-outlined">event</span>Events</a>
  <a href="teams.html" class="active"><span class="material-symbols-outlined">groups</span>Teams</a>
  <a href="profile.html"><span class="material-symbols-outlined">person</span>Profile</a>
</nav>

<div id="cs-toast-container"></div>

<script>
const YEAR = 2026;
const INDEX_LS_KEY = "cs_teams_index_ts";
const INDEX_MAX_AGE = 12 * 60 * 60 * 1000; // 12 hours

let _teamsIndex       = []; // all teams sorted by team_number
let _eventsIndex      = []; // all 2026 events for autocomplete
let _eventFilterKeys  = null; // Set of team_numbers from selected event (null = no event filter)
let _searchTimeout    = null;
let _indexReady       = false;

// ── Init ──────────────────────────────────────────────────────────────
(async function init() {
  if (!navigator.onLine) {
    document.getElementById("offlineBanner").style.display = "flex";
  }
  // Load events for autocomplete (fast, single call)
  loadEventsIndex();
  // Build team index in background
  await buildTeamsIndex();
})();

// ── Teams Index ───────────────────────────────────────────────────────
async function buildTeamsIndex() {
  // Load from IndexedDB first — instant
  const cached = await window.CS.offline.cache.getAllTeams();
  _teamsIndex = cached.sort((a, b) => a.team_number - b.team_number);

  if (_teamsIndex.length > 0) {
    _indexReady = true;
    showReady();
  }

  // Check if we need to refresh from TBA
  const lastTs = parseInt(localStorage.getItem(INDEX_LS_KEY) || "0");
  const needRefresh = Date.now() - lastTs > INDEX_MAX_AGE;

  if (!navigator.onLine) {
    if (_teamsIndex.length === 0) {
      document.getElementById("teamsList").innerHTML = '<div class="cs-empty">No cached teams. Connect to the internet to build the team index.</div>';
    }
    return;
  }

  if (!needRefresh && _teamsIndex.length > 100) {
    return; // recent enough
  }

  // Fetch all team pages from TBA in the background
  document.getElementById("indexBar").style.display = "";
  document.getElementById("indexStatus").style.display = "";

  const allFetched = [];
  let page = 0;
  const MAX_PAGES = 25; // up to 12,500 teams

  while (page < MAX_PAGES) {
    document.getElementById("indexStatus").textContent = `Building team index… page ${page + 1}`;
    document.getElementById("indexFill").style.width = `${Math.min(95, (page / MAX_PAGES) * 100)}%`;

    const teams = await window.CS.tba.getTeamsPage(YEAR, page);
    if (!teams || teams.length === 0) break;

    allFetched.push(...teams);
    // Cache each team immediately
    for (const t of teams) await window.CS.offline.cache.putTeam(t);
    page++;
  }

  if (allFetched.length) {
    // Merge with existing cache (in case some were added from events)
    const byNum = {};
    [..._teamsIndex, ...allFetched].forEach(t => { byNum[t.team_number] = t; });
    _teamsIndex = Object.values(byNum).sort((a, b) => a.team_number - b.team_number);
    localStorage.setItem(INDEX_LS_KEY, String(Date.now()));
  }

  document.getElementById("indexBar").style.display = "none";
  document.getElementById("indexStatus").style.display = "none";
  document.getElementById("indexFill").style.width = "100%";
  _indexReady = true;
  showReady();

  // Re-run any active search
  const q = document.getElementById("teamSearch").value.trim();
  if (q) doSearch();
}

function showReady() {
  if (!document.getElementById("teamSearch").value.trim()) {
    document.getElementById("teamsList").innerHTML = `
      <div class="cs-empty" style="padding-top:40px">
        <span class="material-symbols-outlined" style="font-size:40px;display:block;margin-bottom:8px;color:var(--surface-300)">groups</span>
        ${_teamsIndex.length > 0 ? `${_teamsIndex.length.toLocaleString()} teams indexed. Start typing to search.` : "Type a team number or name to search."}
      </div>`;
  }
}

// ── Events Index (for autocomplete) ───────────────────────────────────
async function loadEventsIndex() {
  // Try cache first
  const cachedEvents = await window.CS.offline.cache.getAllEvents();
  if (cachedEvents.length) {
    _eventsIndex = cachedEvents.sort((a, b) => (a.start_date || "").localeCompare(b.start_date || ""));
  }
  if (!navigator.onLine) return;
  const events = await window.CS.tba.getSeasonEvents(YEAR);
  if (events) {
    for (const e of events) await window.CS.offline.cache.putEvent({ ...e, event_key: e.key });
    _eventsIndex = events.sort((a, b) => (a.start_date || "").localeCompare(b.start_date || ""));
  }
}

// ── Team search ───────────────────────────────────────────────────────
function onSearch() {
  clearTimeout(_searchTimeout);
  _searchTimeout = setTimeout(doSearch, 120); // fast debounce
}

function doSearch() {
  const raw = document.getElementById("teamSearch").value;
  const q = raw.trim();
  const qLow = q.toLowerCase();
  const stripped = q.replace(/^frc/i, "");

  // Start from full index, then apply event filter if one is active
  let pool = _eventFilterKeys
    ? _teamsIndex.filter(t => _eventFilterKeys.has(t.team_number))
    : _teamsIndex;

  if (!q) {
    if (_eventFilterKeys) {
      // Event filter active but no text — show all event teams
      renderTeams(pool.slice(0, 80));
      document.getElementById("resultsLabel").textContent =
        `${pool.length} team${pool.length !== 1 ? "s" : ""} at event${pool.length > 80 ? " (showing first 80)" : ""}`;
    } else {
      showReady();
      document.getElementById("resultsLabel").textContent = "";
    }
    return;
  }

  let results = [];
  if (/^\d+$/.test(stripped)) {
    results = pool.filter(t => String(t.team_number).includes(stripped));
    results.sort((a, b) => {
      const aEx = String(a.team_number) === stripped ? 0 : 1;
      const bEx = String(b.team_number) === stripped ? 0 : 1;
      return aEx - bEx || a.team_number - b.team_number;
    });
  } else {
    results = pool.filter(t =>
      (t.nickname || "").toLowerCase().includes(qLow) ||
      (t.name || "").toLowerCase().includes(qLow) ||
      (t.city || "").toLowerCase().includes(qLow) ||
      (t.state_prov || "").toLowerCase().includes(qLow) ||
      (t.country || "").toLowerCase().includes(qLow)
    );
  }

  renderTeams(results.slice(0, 80));
  document.getElementById("resultsLabel").textContent = results.length
    ? `${results.length} result${results.length !== 1 ? "s" : ""}${results.length > 80 ? " (showing first 80)" : ""}`
    : "";
}

// ── Event autocomplete ─────────────────────────────────────────────────
function onEventKeydown(e) {
  if (e.key === "Enter") {
    const key = document.getElementById("eventKeyInput").value.trim();
    if (key) { closeEventAC(); loadEventTeams(key); }
  }
  if (e.key === "Escape") closeEventAC();
}

function closeEventAC() {
  document.getElementById("eventACDropdown").style.display = "none";
}

function selectEvent(key, name) {
  document.getElementById("eventKeyInput").value = key;
  closeEventAC();
  loadEventTeams(key);
}

function onEventSearch() {
  const q = document.getElementById("eventKeyInput").value.trim().toLowerCase();
  // If input was cleared, remove event filter
  if (!q) { _eventFilterKeys = null; doSearch(); }
  const dd = document.getElementById("eventACDropdown");
  if (!q || !_eventsIndex.length) { dd.style.display = "none"; return; }

  const matches = _eventsIndex.filter(e =>
    (e.name || "").toLowerCase().includes(q) ||
    (e.short_name || "").toLowerCase().includes(q) ||
    (e.key || e.event_key || "").toLowerCase().includes(q) ||
    (e.city || "").toLowerCase().includes(q) ||
    (e.state_prov || "").toLowerCase().includes(q)
  ).slice(0, 12);

  if (!matches.length) { dd.style.display = "none"; return; }

  dd.innerHTML = matches.map(e => {
    const key = e.key || e.event_key || "";
    const loc  = [e.city, e.state_prov].filter(Boolean).join(", ");
    return `<div class="ac-item" onclick="selectEvent('${key}','${(e.short_name||e.name||key).replace(/'/g,"\\'")}')">
      <span class="ac-key">${key}</span>
      <span class="ac-name">${e.short_name || e.name || key}</span>
      ${loc ? `<span class="ac-loc">${loc}</span>` : ""}
    </div>`;
  }).join("");
  dd.style.display = "";
}

async function loadEventTeams(key) {
  if (!key) { key = document.getElementById("eventKeyInput").value.trim(); }
  if (!key) { window.CS.ui.toast("Enter an event key first.", "error"); return; }

  if (!navigator.onLine) {
    window.CS.ui.toast("You're offline — cannot fetch event teams.", "error");
    return;
  }

  document.getElementById("loadingState").style.display = "";

  const teams = await window.CS.tba.getEventTeams(key);
  document.getElementById("loadingState").style.display = "none";

  if (!teams || !teams.length) {
    renderTeams([], "No teams found for that event key. Check the event key and try again.");
    return;
  }
  // Cache all teams and add to index
  for (const t of teams) {
    await window.CS.offline.cache.putTeam(t);
    if (!_teamsIndex.find(x => x.team_number === t.team_number)) _teamsIndex.push(t);
  }
  _teamsIndex.sort((a, b) => a.team_number - b.team_number);

  // Set event filter and re-run search (stacks with text filter)
  _eventFilterKeys = new Set(teams.map(t => t.team_number));
  doSearch();
}

// ── Render ─────────────────────────────────────────────────────────────
function renderTeams(teams, emptyMsg) {
  const el = document.getElementById("teamsList");
  if (!teams.length) {
    el.innerHTML = `<div class="cs-empty" style="padding-top:40px">
      <span class="material-symbols-outlined" style="font-size:40px;display:block;margin-bottom:8px;color:var(--surface-300)">search_off</span>
      ${emptyMsg || "No teams found."}
    </div>`;
    return;
  }
  el.innerHTML = `
    <div style="display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">
      ${teams.map(t => {
        const loc = [t.city, t.state_prov, t.country].filter(Boolean).join(", ");
        return `
          <a href="team.html?number=${t.team_number}" style="text-decoration:none">
            <div class="cs-card" style="cursor:pointer;display:flex;align-items:center;gap:12px">
              <span class="cs-team-chip" style="font-size:1rem;min-width:60px;justify-content:center;flex-shrink:0">${t.team_number}</span>
              <div style="min-width:0;flex:1">
                <div style="font-weight:700;color:var(--surface-950);font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.nickname || t.name || "Team " + t.team_number}</div>
                ${loc ? `<div style="font-size:0.75rem;color:var(--surface-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${loc}</div>` : ""}
                ${t.rookie_year ? `<div style="font-size:0.7rem;color:var(--surface-400)">Since ${t.rookie_year}</div>` : ""}
              </div>
              <span class="material-symbols-outlined" style="margin-left:auto;color:var(--surface-300);font-size:18px;flex-shrink:0">chevron_right</span>
            </div>
          </a>
        `;
      }).join("")}
    </div>
  `;
}
</script>
</body>
</html>
