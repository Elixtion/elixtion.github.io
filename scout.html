<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Scout — CrowdScout</title>
  <meta name="theme-color" content="#111312"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans:wght@400;500;600;700;900&display=swap"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="lib/config.js"></script>
  <script src="lib/tba.js"></script>
  <script src="lib/offline.js"></script>
  <script src="lib/schema2026.js"></script>
  <script src="lib/reliability.js"></script>
  <script src="lib/reliability-compute.js"></script>
  <script src="lib/ui.js"></script>
  <style>
    /* Prevent double-tap zoom on the scout page (cross-browser) */
    * { touch-action: manipulation; }

    /* No animation on scouting forms for speed */
    *, *::before, *::after { transition: none !important; animation: none !important; }
    .cs-phase-chevron { transition: transform 0.15s !important; }

    /* Match context bar */
    .match-ctx-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      background: var(--surface-50); border: 1px solid var(--surface-100);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 14px;
    }
    .ctx-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px; border-radius: 99px; font-weight: 600; font-size: 0.78rem;
      background: var(--surface-100); color: var(--surface-600);
    }
    .ctx-chip.green { background: var(--primary-950); color: var(--primary-400); }
    .ctx-chip.red   { background: rgba(239,68,68,.12); color: #f87171; }
    .ctx-chip.blue  { background: rgba(96,165,250,.12); color: #60a5fa; }

    /* Locked (auto-filled) field */
    .cs-input:disabled, .cs-select:disabled {
      background: var(--surface-100) !important;
      color: var(--surface-400) !important;
      cursor: not-allowed;
      opacity: 1;
    }
    .lbl-lock {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.7rem; color: var(--primary-500); font-weight: 600;
      margin-left: 4px;
    }

    /* Submit footer */
    .scout-footer {
      position: sticky; bottom: 60px; z-index: 20;
      padding: 10px 0; pointer-events: none;
      background: var(--surface-950);
    }
    .scout-footer-inner {
      display: flex; gap: 8px;
      background: var(--surface-950); border-radius: 12px;
      padding: 10px; border: 1px solid var(--surface-100);
      pointer-events: all;
    }
  </style>
</head>
<body>

<header class="cs-header">
  <a href="home.html" class="cs-header-brand">
    <img src="https://raw.githubusercontent.com/Elixtion/elixtion.github.io/refs/heads/main/images/Untitled%20design%20(3).png" alt="CrowdScout"/>
    <span>Scout</span>
  </a>
  <div id="connBar" class="cs-pill cs-pill-gray" style="font-size:0.72rem">…</div>
</header>

<main class="cs-page">

  <!-- ── Connectivity ──────────────────────────────────────────────── -->
  <div class="cs-card cs-card-sm" style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px">
    <span id="connText" style="font-size:0.85rem;color:var(--surface-500)">Checking connectivity…</span>
    <button class="cs-btn cs-btn-sm cs-btn-secondary" onclick="manualSync()">
      <span class="material-symbols-outlined" style="font-size:16px">sync</span> Sync
    </button>
  </div>

  <!-- ── Match Setup ────────────────────────────────────────────────── -->
  <div class="cs-card" id="setupCard" style="margin-bottom:16px">
    <h2 class="cs-section-title" style="margin-top:0">Match Setup</h2>

    <!-- Event key + Cache button -->
    <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:4px">
      <div class="cs-field" style="flex:1;margin-bottom:0">
        <label class="cs-label">Event Key</label>
        <input id="setupEvent" class="cs-input" placeholder="e.g. 2026txhou"
               autocapitalize="none" autocorrect="off"
               oninput="onEventKeyChange()"/>
      </div>
      <button id="cacheBtn" class="cs-btn cs-btn-secondary cs-btn-sm" style="flex-shrink:0;height:42px"
              onclick="cacheSchedule()">
        <span class="material-symbols-outlined" style="font-size:16px">download_for_offline</span> Cache
      </button>
      <button id="clearCacheBtn" class="cs-btn cs-btn-ghost cs-btn-sm" style="flex-shrink:0;height:42px;display:none"
              onclick="clearCachedSchedule()" title="Clear cached schedule">
        <span class="material-symbols-outlined" style="font-size:16px">delete_outline</span>
      </button>
    </div>
    <div id="scheduleStatus" style="font-size:0.78rem;min-height:18px;margin-bottom:12px"></div>

    <!-- Match type -->
    <div class="cs-field">
      <label class="cs-label">Match Type</label>
      <div class="cs-toggle-group">
        <button id="type-qual"    class="cs-toggle-btn active-yes" onclick="setMatchType('qualification')" style="flex:1">Qualification</button>
        <button id="type-playoff" class="cs-toggle-btn"            onclick="setMatchType('playoff')"       style="flex:1">Playoff</button>
      </div>
    </div>

    <!-- The 3 smart fields -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="cs-field" style="margin-bottom:0">
        <label class="cs-label" id="lbl-match">Match #</label>
        <input id="setupMatch" class="cs-input" type="number" min="1" placeholder="1"
               oninput="onSmartInput('match')"/>
      </div>
      <div class="cs-field" style="margin-bottom:0">
        <label class="cs-label" id="lbl-team">Team # <span class="lbl-lock"><span class="material-symbols-outlined" style="font-size:12px">lock</span>Auto</span></label>
        <input id="setupTeam" class="cs-input" type="number" min="1" placeholder="—"
               disabled/>
      </div>
      <div class="cs-field" style="margin-bottom:0">
        <label class="cs-label" id="lbl-station">Station</label>
        <select id="setupStation" class="cs-select" onchange="onSmartInput('station')">
          <option value="">—</option>
          <option value="1">Red 1</option>
          <option value="2">Red 2</option>
          <option value="3">Red 3</option>
          <option value="4">Blue 1</option>
          <option value="5">Blue 2</option>
          <option value="6">Blue 3</option>
        </select>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:8px">
      <button class="cs-btn cs-btn-ghost cs-btn-sm" style="flex-shrink:0" onclick="clearMatchFields()" title="Clear match, team, station">
        <span class="material-symbols-outlined" style="font-size:16px">clear_all</span> Clear
      </button>
      <button id="startBtn" class="cs-btn cs-btn-primary" style="flex:1" onclick="startScouting()" disabled>
        <span class="material-symbols-outlined">edit_note</span> Start Scouting
      </button>
    </div>
  </div>

  <!-- ── Context bar (shown while scouting) ────────────────────────── -->
  <div id="ctxBar" class="match-ctx-bar" style="display:none"></div>

  <!-- ── Scouting form ──────────────────────────────────────────────── -->
  <div id="formSection" style="display:none">
    <div id="phasesRoot"></div>
  </div>

  <!-- ── Submit footer ─────────────────────────────────────────────── -->
  <div id="scoutFooter" class="scout-footer" style="display:none">
    <div class="scout-footer-inner">
      <button class="cs-btn cs-btn-secondary" style="flex-shrink:0" onclick="resetAnswers()" title="Clear answers only">
        <span class="material-symbols-outlined">restart_alt</span>
      </button>
      <button id="submitBtn" class="cs-btn cs-btn-primary" style="flex:1" onclick="submitForm()">
        <span class="material-symbols-outlined">upload</span> Submit
      </button>
    </div>
  </div>

  <!-- ── Pending queue ──────────────────────────────────────────────── -->
  <div style="margin-top:24px">
    <h2 class="cs-section-title">Pending Submissions</h2>
    <div id="queueList"><div class="cs-empty">No pending submissions.</div></div>
  </div>

</main>

<nav class="cs-mobile-nav">
  <a href="home.html"><span class="material-symbols-outlined">home</span>Home</a>
  <a href="scout.html" class="active"><span class="material-symbols-outlined">edit_note</span>Scout</a>
  <a href="events.html"><span class="material-symbols-outlined">event</span>Events</a>
  <a href="teams.html"><span class="material-symbols-outlined">groups</span>Teams</a>
  <a href="profile.html"><span class="material-symbols-outlined">person</span>Profile</a>
</nav>

<div id="cs-toast-container"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const STATION_LABELS = ["", "Red 1", "Red 2", "Red 3", "Blue 1", "Blue 2", "Blue 3"];

const formState = {
  eventKey: null, matchNumber: null, matchType: "qualification",
  teamNumber: null, driverStation: null, allianceColor: null,
  answers: {}, history: [],
};

let _schedule = null;   // array of match objects cached for the current event
let _session = null;

// ── Init ───────────────────────────────────────────────────────────────
(async function init() {
  _session = await window.CS.ui.requireProfileComplete("profile-setup.html");
  if (!_session) return;

  updateConnUI();
  renderQueue();
  window.addEventListener("cs-connectivity", () => { updateConnUI(); renderQueue(); });

  // URL params from event.html "Scout" button links
  const p = new URLSearchParams(location.search);
  const urlEvent = p.get("event") || p.get("key");
  const urlMatch = parseInt(p.get("match"));
  const urlType  = p.get("type");
  const urlStation = parseInt(p.get("station"));

  const eventKey = urlEvent || localStorage.getItem("cs_last_event") || "";
  if (eventKey) {
    document.getElementById("setupEvent").value = eventKey;
    await loadCachedSchedule(eventKey);
  }

  if (!isNaN(urlMatch) && urlMatch > 0) document.getElementById("setupMatch").value = urlMatch;
  if (urlType) setMatchType(urlType === "qualification" || urlType === "qual" ? "qualification" : "playoff");
  if (!isNaN(urlStation) && urlStation >= 1 && urlStation <= 6) document.getElementById("setupStation").value = urlStation;

  // Try auto-fill from match + station (team is always derived, never set from URL)
  if (urlMatch || urlStation) tryAutoFill();
  checkStartReady();
})();

// ── Connectivity ───────────────────────────────────────────────────────
function updateConnUI() {
  const c = window.CS.offline?.connectivity ?? { isOnline: true, pendingCount: 0 };
  const bar = document.getElementById("connBar");
  const txt = document.getElementById("connText");
  if (!c.isOnline) {
    bar.className = "cs-pill cs-pill-red"; bar.textContent = "Offline";
    txt.innerHTML = `<span style="color:#f87171">⬤</span> Offline — ${c.pendingCount} saved locally`;
  } else if (c.pendingCount > 0) {
    bar.className = "cs-pill cs-pill-yellow"; bar.textContent = `Syncing ${c.pendingCount}`;
    txt.innerHTML = `<span style="color:#fbbf24">⬤</span> Online — syncing ${c.pendingCount}…`;
  } else {
    bar.className = "cs-pill cs-pill-green"; bar.textContent = "Online";
    txt.innerHTML = `<span style="color:var(--primary-500)">⬤</span> Online — all synced`;
  }
}

async function manualSync() {
  const r = await window.CS.offline.syncAll();
  window.CS.ui.toast(`Synced: ${r.synced} · Failed: ${r.failed}`, r.failed ? "warning" : "success");
  updateConnUI(); renderQueue();
}

// ── Schedule caching ────────────────────────────────────────────────────
function scheduleKey(eventKey) { return `sched_${eventKey}`; }

async function loadCachedSchedule(eventKey) {
  if (!eventKey) return;
  try {
    const cached = await window.CS.offline.cache.getMatch(scheduleKey(eventKey));
    if (cached?.matches?.length) {
      _schedule = cached.matches;
      const age = Math.round((Date.now() - (cached.cachedAt || 0)) / 60000);
      const st = document.getElementById("scheduleStatus");
      const qualCount = _schedule.filter(m => m.comp_level === "qm").length;
      st.innerHTML = `<span style="color:var(--primary-400)">✓</span> ${_schedule.length} matches cached (${qualCount} quals${age > 0 ? `, ${age}m ago` : ""}).`;
      document.getElementById("clearCacheBtn").style.display = "";
    }
  } catch (_) {}
}

function onEventKeyChange() {
  // When user changes event key, clear the old cached schedule info
  _schedule = null;
  document.getElementById("scheduleStatus").textContent = "";
  document.getElementById("clearCacheBtn").style.display = "none";
  document.getElementById("setupTeam").value = "";
  checkStartReady();
}

async function clearCachedSchedule() {
  const eventKey = document.getElementById("setupEvent").value.trim().toLowerCase();
  if (eventKey) {
    try { await window.CS.offline.cache.deleteMatch(scheduleKey(eventKey)); } catch (_) {}
  }
  _schedule = null;
  document.getElementById("scheduleStatus").textContent = "";
  document.getElementById("clearCacheBtn").style.display = "none";
  document.getElementById("setupTeam").value = "";
  checkStartReady();
  window.CS.ui.toast("Schedule cache cleared.", "success");
}

async function cacheSchedule() {
  const eventKey = document.getElementById("setupEvent").value.trim().toLowerCase();
  if (!eventKey) { window.CS.ui.toast("Enter an event key first.", "error"); return; }

  const btn = document.getElementById("cacheBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">hourglass_top</span>';
  const st = document.getElementById("scheduleStatus");
  st.innerHTML = `<span style="color:var(--surface-400)">Loading schedule…</span>`;

  if (!navigator.onLine) {
    await loadCachedSchedule(eventKey);
    if (!_schedule) {
      st.innerHTML = `<span style="color:#f87171">You're offline — no cached schedule for "${eventKey}".</span>`;
    }
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">download_for_offline</span> Cache';
    return;
  }

  try {
    document.getElementById("setupEvent").value = eventKey; // normalise to lowercase
    const matches = await window.CS.tba.getEventMatches(eventKey);
    if (!matches?.length) {
      st.innerHTML = `<span style="color:#f87171">No matches found for "${eventKey}".</span>`;
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">download_for_offline</span> Cache';
      return;
    }

    // Store lightweight version — only team assignments, no scores needed
    const light = matches.map(m => ({
      match_number: m.match_number,
      set_number:   m.set_number,
      comp_level:   m.comp_level,
      alliances: {
        red:  { team_keys: m.alliances?.red?.team_keys  || [] },
        blue: { team_keys: m.alliances?.blue?.team_keys || [] },
      },
    }));

    await window.CS.offline.cache.putMatch({
      id: scheduleKey(eventKey),
      matches: light,
      cachedAt: Date.now(),
    });

    _schedule = light;
    localStorage.setItem("cs_last_event", eventKey);
    const qualCount = light.filter(m => m.comp_level === "qm").length;
    st.innerHTML = `<span style="color:var(--primary-400)">✓</span> Cached — ${light.length} matches (${qualCount} quals). You can now scout offline.`;
    window.CS.ui.toast(`Schedule cached — ${light.length} matches.`, "success");
    document.getElementById("clearCacheBtn").style.display = "";
    tryAutoFill();
    checkStartReady();
  } catch (err) {
    st.innerHTML = `<span style="color:#f87171">Failed to load schedule. Check the event key.</span>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">download_for_offline</span> Cache';
}

// ── Match type ──────────────────────────────────────────────────────────
function setMatchType(type) {
  formState.matchType = type;
  document.getElementById("type-qual").className    = "cs-toggle-btn" + (type === "qualification" ? " active-yes" : "");
  document.getElementById("type-playoff").className = "cs-toggle-btn" + (type === "playoff"       ? " active-yes" : "");
  document.getElementById("setupTeam").value = ""; // team auto-fill only works for quals
  tryAutoFill();
  checkStartReady();
}

// ── Smart auto-fill logic ───────────────────────────────────────────────
// Team is ALWAYS read-only. Only match + station → team derivation is supported.
function onSmartInput() {
  tryAutoFill();
  checkStartReady();
}

function tryAutoFill() {
  if (!_schedule?.length) return;     // no schedule cached
  if (formState.matchType !== "qualification") return; // only auto-fill quals

  const matchNum   = parseInt(document.getElementById("setupMatch").value);
  const stationVal = parseInt(document.getElementById("setupStation").value);

  const hasMatch   = !isNaN(matchNum)   && matchNum   >= 1;
  const hasStation = !isNaN(stationVal) && stationVal >= 1 && stationVal <= 6;

  if (hasMatch && hasStation) {
    // Derive team from match + station
    const match = _schedule.find(m => m.comp_level === "qm" && m.match_number === matchNum);
    if (!match) { document.getElementById("setupTeam").value = ""; checkStartReady(); return; }
    const alliance = stationVal <= 3 ? "red" : "blue";
    const pos = (stationVal - 1) % 3;
    const teamKey = match.alliances[alliance]?.team_keys?.[pos];
    if (teamKey) {
      const tn = parseInt(teamKey.replace("frc", ""));
      if (!isNaN(tn) && tn > 0) document.getElementById("setupTeam").value = tn;
      else document.getElementById("setupTeam").value = "";
    } else {
      document.getElementById("setupTeam").value = "";
    }
  } else {
    // Not enough info to derive team — clear it
    document.getElementById("setupTeam").value = "";
  }
  checkStartReady();
}

function clearMatchFields() {
  document.getElementById("setupMatch").value   = "";
  document.getElementById("setupTeam").value    = "";
  document.getElementById("setupStation").value = "";
  checkStartReady();
  hideFormSection();
}

// ── Ready check ─────────────────────────────────────────────────────────
function checkStartReady() {
  const matchNum   = parseInt(document.getElementById("setupMatch").value);
  const teamNum    = parseInt(document.getElementById("setupTeam").value);
  const stationVal = parseInt(document.getElementById("setupStation").value);
  const eventKey   = document.getElementById("setupEvent").value.trim();
  const ready = eventKey && !isNaN(matchNum) && matchNum >= 1
             && !isNaN(teamNum) && teamNum >= 1
             && !isNaN(stationVal) && stationVal >= 1 && stationVal <= 6;
  document.getElementById("startBtn").disabled = !ready;
}

// ── Start scouting ──────────────────────────────────────────────────────
function startScouting() {
  const eventKey   = document.getElementById("setupEvent").value.trim();
  const matchNum   = parseInt(document.getElementById("setupMatch").value);
  const teamNum    = parseInt(document.getElementById("setupTeam").value);
  const stationVal = parseInt(document.getElementById("setupStation").value);

  if (!eventKey) { window.CS.ui.toast("Enter an event key.", "error"); return; }

  formState.eventKey      = eventKey;
  formState.matchNumber   = matchNum;
  formState.teamNumber    = teamNum;
  formState.driverStation = stationVal;
  formState.allianceColor = stationVal <= 3 ? "red" : "blue";

  localStorage.setItem("cs_last_event", eventKey);
  showFormSection();
}

// ── Show / hide form section ─────────────────────────────────────────────
function showFormSection() {
  // Render context bar
  const color = formState.allianceColor;
  const matchLbl = formState.matchType === "qualification"
    ? `Qual ${formState.matchNumber}`
    : `Playoff ${formState.matchNumber}`;

  document.getElementById("ctxBar").style.display = "flex";
  document.getElementById("ctxBar").innerHTML = `
    <span class="ctx-chip green">${formState.eventKey}</span>
    <span class="ctx-chip">${matchLbl}</span>
    <span class="ctx-chip ${color}">${STATION_LABELS[formState.driverStation]}</span>
    <span class="ctx-chip">Team <strong>${formState.teamNumber}</strong></span>
    <button onclick="hideFormSection()" title="Back to setup"
      style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--surface-400);display:inline-flex;align-items:center">
      <span class="material-symbols-outlined" style="font-size:18px">edit</span>
    </button>
  `;

  document.getElementById("formSection").style.display = "";
  document.getElementById("scoutFooter").style.display = "";
  renderForm();

  // Scroll past setup card
  document.getElementById("ctxBar").scrollIntoView({ behavior: "instant", block: "start" });
}

function hideFormSection() {
  document.getElementById("formSection").style.display = "none";
  document.getElementById("scoutFooter").style.display = "none";
  document.getElementById("ctxBar").style.display = "none";
  formState.answers = {};
  formState.history = [];
}

// ── Render form from schema ──────────────────────────────────────────────
function renderForm() {
  formState.answers = {};
  formState.history = [];
  const root = document.getElementById("phasesRoot");
  root.innerHTML = "";
  window.CS.schema2026.sections.forEach((section, idx) => {
    root.appendChild(buildPhaseSection(section, idx === 0));
  });
}

function buildPhaseSection(section, open) {
  const div = document.createElement("div");
  div.className = "cs-phase" + (open ? " open" : "");
  div.id = "phase-" + section.id;
  const badgeCls = { auto:"cs-phase-badge-auto", teleop:"cs-phase-badge-teleop", endgame:"cs-phase-badge-endgame", post_match:"cs-phase-badge-postmatch" }[section.phase] || "";
  div.innerHTML = `
    <div class="cs-phase-header" onclick="togglePhase('${section.id}')">
      <span class="cs-phase-title">
        ${section.title}
        <span class="cs-phase-badge ${badgeCls}">${section.phase.replace("_"," ").toUpperCase()}</span>
      </span>
      <span class="material-symbols-outlined cs-phase-chevron">expand_more</span>
    </div>
    <div class="cs-phase-body" id="phasebody-${section.id}"></div>
  `;
  const body = div.querySelector(".cs-phase-body");
  section.fields.forEach(f => body.appendChild(buildField(f)));
  return div;
}

function togglePhase(id) {
  document.getElementById("phase-" + id).classList.toggle("open");
}

// ── Field builders ────────────────────────────────────────────────────────
function buildField(field) {
  const wrap = document.createElement("div");
  wrap.className = "cs-field";
  wrap.id = "field-wrap-" + field.id;
  const lbl = document.createElement("label");
  lbl.className = "cs-label";
  lbl.textContent = field.label + (field.required ? " *" : "");
  wrap.appendChild(lbl);
  switch (field.type) {
    case "tally":   wrap.appendChild(buildTally(field));   break;
    case "boolean": wrap.appendChild(buildBoolean(field)); break;
    case "range":   wrap.appendChild(buildRange(field));   break;
    case "select":  wrap.appendChild(buildSelect(field));  break;
    case "number":  wrap.appendChild(buildNumber(field));  break;
    default: break;
  }
  return wrap;
}

function buildTally(field) {
  const increments = field.config?.increments ?? [1,3,5,10,20];
  formState.answers[field.id] = 0;
  const div = document.createElement("div");
  div.className = "cs-tally";
  div.innerHTML = `
    <div class="cs-tally-total-label">${field.label}</div>
    <div class="cs-tally-total" id="td-${field.id}">0</div>
    <div class="cs-tally-btns" id="tb-${field.id}"></div>
    <button class="cs-tally-undo" id="tu-${field.id}" disabled onclick="tallyUndo('${field.id}')">
      <span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px">undo</span> Undo
    </button>
  `;
  const row = div.querySelector(`#tb-${field.id}`);
  increments.forEach(inc => {
    const btn = document.createElement("button");
    btn.className = "cs-tally-btn";
    btn.textContent = `+${inc}`;
    btn.addEventListener("click", () => {
      tallyInc(field.id, inc);
      if (navigator.vibrate) navigator.vibrate(25);
    });
    row.appendChild(btn);
  });
  return div;
}
function tallyInc(id, inc) {
  const prev = formState.answers[id] ?? 0;
  formState.history.push({ fieldId: id, prevValue: prev });
  formState.answers[id] = prev + inc;
  const el = document.getElementById(`td-${id}`);
  if (el) el.textContent = formState.answers[id];
  const undo = document.getElementById(`tu-${id}`);
  if (undo) undo.disabled = false;
}
function tallyUndo(id) {
  for (let i = formState.history.length - 1; i >= 0; i--) {
    if (formState.history[i].fieldId === id) {
      formState.answers[id] = formState.history[i].prevValue;
      formState.history.splice(i, 1);
      const el = document.getElementById(`td-${id}`);
      if (el) el.textContent = formState.answers[id];
      const undo = document.getElementById(`tu-${id}`);
      if (undo) undo.disabled = !formState.history.some(h => h.fieldId === id);
      return;
    }
  }
}

function buildBoolean(field) {
  formState.answers[field.id] = null;
  const div = document.createElement("div");
  div.className = "cs-toggle-group";
  div.innerHTML = `
    <button class="cs-toggle-btn" id="by-${field.id}" onclick="setBool('${field.id}',true)">
      <span class="material-symbols-outlined" style="font-size:18px">check</span> Yes
    </button>
    <button class="cs-toggle-btn" id="bn-${field.id}" onclick="setBool('${field.id}',false)">
      <span class="material-symbols-outlined" style="font-size:18px">close</span> No
    </button>
  `;
  return div;
}
function setBool(id, val) {
  formState.answers[id] = val;
  document.getElementById(`by-${id}`).className = "cs-toggle-btn" + (val === true  ? " active-yes" : "");
  document.getElementById(`bn-${id}`).className = "cs-toggle-btn" + (val === false ? " active-no"  : "");
}

function buildRange(field) {
  formState.answers[field.id] = null;
  const div = document.createElement("div");
  div.className = "cs-range-group";
  (field.config?.ranges ?? []).forEach(r => {
    const btn = document.createElement("button");
    btn.className = "cs-range-btn";
    btn.textContent = r.label;
    btn.id = `rng-${field.id}-${r.value}`;
    btn.addEventListener("click", () => {
      formState.answers[field.id] = r.value;
      document.querySelectorAll(`[id^="rng-${field.id}-"]`).forEach(b =>
        b.className = "cs-range-btn" + (b.id === `rng-${field.id}-${r.value}` ? " active" : ""));
    });
    div.appendChild(btn);
  });
  return div;
}

function buildSelect(field) {
  formState.answers[field.id] = null;
  const sel = document.createElement("select");
  sel.className = "cs-select";
  sel.id = "sel-" + field.id;
  const blank = document.createElement("option");
  blank.value = ""; blank.textContent = field.required ? "— Select —" : "— (optional) —";
  blank.selected = true; sel.appendChild(blank);
  (field.config?.options ?? []).forEach(opt => {
    const o = document.createElement("option");
    o.value = opt.value; o.textContent = opt.label; sel.appendChild(o);
  });
  sel.addEventListener("change", () => { formState.answers[field.id] = sel.value || null; });
  return sel;
}

function buildNumber(field) {
  formState.answers[field.id] = field.config?.min ?? 0;
  const cfg = field.config || {};
  const wrap = document.createElement("div");
  wrap.style.cssText = "display:flex;align-items:center;gap:12px";
  const minus = document.createElement("button");
  minus.className = "cs-btn cs-btn-secondary cs-btn-sm";
  minus.innerHTML = '<span class="material-symbols-outlined">remove</span>';
  const disp = document.createElement("span");
  disp.style.cssText = "font-size:1.5rem;font-weight:700;min-width:40px;text-align:center";
  disp.textContent = formState.answers[field.id];
  const plus = document.createElement("button");
  plus.className = "cs-btn cs-btn-primary cs-btn-sm";
  plus.innerHTML = '<span class="material-symbols-outlined">add</span>';
  const step = cfg.step??1, min=cfg.min??0, max=cfg.max??999;
  minus.addEventListener("click", () => { const v=Math.max(min,(formState.answers[field.id]??0)-step); formState.answers[field.id]=v; disp.textContent=v; });
  plus.addEventListener("click",  () => { const v=Math.min(max,(formState.answers[field.id]??0)+step); formState.answers[field.id]=v; disp.textContent=v; });
  wrap.appendChild(minus); wrap.appendChild(disp); wrap.appendChild(plus);
  return wrap;
}

// ── Validate ─────────────────────────────────────────────────────────────
function validateForm() {
  const errors = [];
  for (const section of window.CS.schema2026.sections) {
    for (const field of section.fields) {
      if (field.required) {
        const val = formState.answers[field.id];
        if (val === null || val === undefined || val === "") {
          errors.push(`${section.title}: "${field.label}" is required.`);
          const phase = document.getElementById("phase-" + section.id);
          if (phase && !phase.classList.contains("open")) phase.classList.add("open");
        }
      }
    }
  }
  return errors;
}

// ── Submit ────────────────────────────────────────────────────────────────
async function submitForm() {
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined">hourglass_top</span> Saving…';

  const errors = validateForm();
  if (errors.length) {
    window.CS.ui.toast(errors[0], "error", 4000);
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">upload</span> Submit';
    return;
  }

  const payload = {
    season_id: null,
    event_key:      formState.eventKey,
    match_number:   formState.matchNumber,
    match_type:     formState.matchType,
    team_number:    formState.teamNumber,
    driver_station: formState.driverStation,
    alliance_color: formState.allianceColor,
    answers: { ...formState.answers },
    schema_version: "2026-v1.0",
    owner_id:       _session?.user?.id ?? null,
    owner_display:  _session?.user?.user_metadata?.full_name || _session?.user?.email || "Anonymous",
    created_at:     new Date().toISOString(),
    reliability_score: 1.0,
  };

  try {
    await window.CS.offline.saveSubmission(payload, "match_scout");
    const synced = window.CS.offline.connectivity.isOnline;
    window.CS.ui.toast(
      synced ? "Submitted! Ready for next match." : "Saved offline — will sync when connected.",
      "success", 3000
    );

    // Background reliability recompute
    if (_session?.user?.id) window.CS.reliabilityCompute.updateAfterSubmit(_session.user.id);

    // Reset: keep event + match type, increment match #, clear team + station
    const nextMatch = (formState.matchNumber || 0) + 1;
    hideFormSection();
    document.getElementById("setupMatch").value   = nextMatch;
    document.getElementById("setupTeam").value    = "";
    document.getElementById("setupStation").value = "";
    checkStartReady();
    renderQueue();

    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">upload</span> Submit';
  } catch (err) {
    window.CS.ui.toast("Save failed: " + err.message, "error", 5000);
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">upload</span> Submit';
  }
}

function resetAnswers() {
  if (!confirm("Clear all scouting answers for this match?")) return;
  renderForm();
  window.CS.ui.toast("Answers cleared.", "info", 2000);
}

// ── Pending queue ─────────────────────────────────────────────────────────
async function renderQueue() {
  const queue = await window.CS.offline.getSyncQueue();
  const el = document.getElementById("queueList");
  if (!queue.length) { el.innerHTML = '<div class="cs-empty">No pending submissions.</div>'; return; }
  el.innerHTML = queue.map(item => `
    <div class="cs-card cs-card-sm" style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        <div style="font-weight:600;font-size:0.9rem">
          Team ${item.data?.team_number ?? "?"} · ${item.data?.event_key ?? "?"} Q${item.data?.match_number ?? "?"}
        </div>
        <div style="font-size:0.75rem;color:var(--surface-500)">${new Date(item.createdAt).toLocaleString()}</div>
      </div>
      <span class="cs-pill ${item.syncStatus === 'pending' ? 'cs-pill-yellow' : item.syncStatus === 'failed' ? 'cs-pill-red' : 'cs-pill-green'}">
        ${item.syncStatus}
      </span>
    </div>
  `).join("");
}
</script>
