<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Team — CrowdScout</title>
  <meta name="theme-color" content="#111312"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans:wght@400;500;600;700;900&display=swap"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="lib/config.js"></script>
  <script src="lib/tba.js"></script>
  <script src="lib/statbotics.js"></script>
  <script src="lib/offline.js"></script>
  <script src="lib/reliability.js"></script>
  <script src="lib/schema2026.js"></script>
  <script src="lib/ui.js"></script>
  <style>
    .cs-tab { padding:12px 18px;font-size:.875rem;font-weight:600;background:transparent;border:none;cursor:pointer;color:var(--surface-500);border-bottom:2px solid transparent;white-space:nowrap; }
    .cs-tab.active { color:var(--primary-500);border-bottom-color:var(--primary-500); }
    .epa-bar-bg { background:var(--surface-200);border-radius:99px;height:6px;overflow:hidden;flex:1 }
    .epa-bar-fill { height:100%;border-radius:99px;background:var(--primary-500);transition:width .4s ease }
    .match-row { display:grid;grid-template-columns:72px 1fr 1fr 72px;gap:6px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--surface-100);font-size:0.82rem }
    .match-row:last-child { border-bottom:none }
    .match-row:hover { background:var(--surface-100) }
    .alliance-cell { display:flex;gap:4px;flex-wrap:wrap }
    .team-link { display:inline-block;padding:2px 6px;border-radius:4px;font-weight:600;font-size:0.78rem;text-decoration:none;transition:opacity .15s }
    .team-link:hover { opacity:.75 }
    .team-link.red { background:rgba(239,68,68,.15);color:#f87171 }
    .team-link.blue { background:rgba(96,165,250,.15);color:#60a5fa }
    .team-link.highlight { outline:2px solid currentColor;outline-offset:1px }
    .score-cell { font-weight:800;font-size:0.95rem;text-align:right }
    .score-cell.win { color:var(--primary-500) }
    .score-cell.loss { color:#f87171 }
    .score-cell.tie { color:var(--surface-400) }
    .match-label { font-weight:700;color:var(--surface-700) }
    .video-icon { color:var(--surface-400);text-decoration:none;display:inline-flex;align-items:center }
    .video-icon:hover { color:#f87171 }
    .event-section-hdr { background:var(--surface-100);padding:8px 12px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--surface-500);display:flex;align-items:center;justify-content:space-between }
  </style>
</head>
<body>

<header class="cs-header">
  <a href="javascript:history.back()" class="cs-header-brand">
    <span class="material-symbols-outlined" style="color:var(--surface-500);font-size:20px">arrow_back</span>
    <img src="https://raw.githubusercontent.com/Elixtion/elixtion.github.io/refs/heads/main/images/Untitled%20design%20(3).png" alt="CrowdScout"/>
    <span id="headerTitle">Team</span>
  </a>
  <nav class="cs-nav">
    <a href="scout.html">Scout</a>
    <a href="events.html">Events</a>
  </nav>
</header>

<!-- Tab bar -->
<div style="background:var(--surface-50);border-bottom:1px solid var(--surface-100);display:flex;overflow-x:auto;position:sticky;top:56px;z-index:10">
  <button class="cs-tab active" onclick="showTab('overview')" id="tab-overview">Overview</button>
  <button class="cs-tab" onclick="showTab('stats')" id="tab-stats">Scout Data</button>
  <button class="cs-tab" onclick="showTab('matches')" id="tab-matches">Matches</button>
</div>

<main class="cs-page" style="padding-top:16px">

  <!-- ── Overview tab ──────────────────────────────────────────── -->
  <div id="pane-overview">

    <!-- Team hero card -->
    <div class="cs-card" id="teamHeroCard" style="margin-bottom:16px;padding:0;overflow:hidden">
      <div class="cs-skeleton" style="height:120px"></div>
    </div>

    <!-- Statbotics EPA -->
    <div class="cs-card" id="epaCard" style="margin-bottom:16px;display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 class="cs-section-title" style="margin:0">2026 EPA</h3>
        <a href="#" id="epaStatboticsLink" target="_blank" rel="noopener" style="font-size:0.75rem;color:var(--primary-500)">View on Statbotics ↗</a>
      </div>
      <div id="epaContent"></div>
    </div>

    <!-- Upcoming matches -->
    <div id="upcomingSection" style="display:none;margin-bottom:16px">
      <h3 class="cs-section-title">Upcoming Matches</h3>
      <div id="upcomingList"></div>
    </div>

    <!-- 2026 events -->
    <div>
      <h3 class="cs-section-title">2026 Events</h3>
      <div id="teamEvents"><div class="cs-skeleton" style="height:48px;border-radius:8px"></div></div>
    </div>

  </div>

  <!-- ── Scout data tab ────────────────────────────────────────── -->
  <div id="pane-stats" style="display:none">
    <div class="cs-field">
      <label class="cs-label">Filter by Event</label>
      <select id="statsEventFilter" class="cs-select" onchange="loadScoutStats()">
        <option value="">All Events</option>
      </select>
    </div>
    <div id="scoutStats"><div class="cs-empty">No scouting data yet.</div></div>
  </div>

  <!-- ── Matches tab ───────────────────────────────────────────── -->
  <div id="pane-matches" style="display:none">
    <div class="cs-field">
      <label class="cs-label">Event</label>
      <select id="matchEventFilter" class="cs-select" onchange="loadTeamMatches()">
        <option value="">Select event…</option>
      </select>
    </div>
    <div id="matchesList"><div class="cs-empty">Select an event to see matches.</div></div>
  </div>

</main>

<nav class="cs-mobile-nav">
  <a href="home.html"><span class="material-symbols-outlined">home</span>Home</a>
  <a href="scout.html"><span class="material-symbols-outlined">edit_note</span>Scout</a>
  <a href="events.html"><span class="material-symbols-outlined">event</span>Events</a>
  <a href="teams.html" class="active"><span class="material-symbols-outlined">groups</span>Teams</a>
  <a href="profile.html"><span class="material-symbols-outlined">person</span>Profile</a>
</nav>

<div id="cs-toast-container"></div>

<script>
const params = new URLSearchParams(location.search);
const TEAM_NUMBER = parseInt(params.get("number")) || 0;
let teamEvents2026 = [];
const YEAR = 2026;

if (!TEAM_NUMBER) window.location.href = "teams.html";

(async function init() {
  document.getElementById("headerTitle").textContent = `Team ${TEAM_NUMBER}`;
  document.title = `Team ${TEAM_NUMBER} — CrowdScout`;
  await Promise.all([loadTeamInfo(), loadTeamEvents()]);
  loadScoutStats();
})();

function showTab(name) {
  ["overview","stats","matches"].forEach(t => {
    document.getElementById("pane-" + t).style.display = t === name ? "" : "none";
    document.getElementById("tab-" + t).className = "cs-tab" + (t === name ? " active" : "");
  });
}

// ─────────────────────────────────────────────────────────────────
// Team info + photo + EPA
// ─────────────────────────────────────────────────────────────────
async function loadTeamInfo() {
  const [team, media, sbYear] = await Promise.all([
    window.CS.tba.getTeam(TEAM_NUMBER),
    window.CS.tba.getTeamMedia(TEAM_NUMBER, YEAR),
    window.CS.statbotics.getTeamYear(TEAM_NUMBER, YEAR),
  ]);

  renderHeroCard(team, media);
  renderEPA(sbYear);
  if (team) await loadUpcomingMatches(team);
}

function renderHeroCard(team, media) {
  const card = document.getElementById("teamHeroCard");
  if (!team) {
    card.innerHTML = `
      <div style="padding:20px">
        <div style="font-size:1.6rem;font-weight:800;color:var(--primary-500)">${TEAM_NUMBER}</div>
        <div style="color:var(--surface-500);font-size:0.85rem;margin-top:4px">Team info unavailable (TBA offline)</div>
      </div>`;
    return;
  }

  document.title = `${team.nickname || team.name} (${TEAM_NUMBER}) — CrowdScout`;
  document.getElementById("headerTitle").textContent = team.nickname || `Team ${TEAM_NUMBER}`;

  const photoUrl = window.CS.tba.getBestPhoto(media);
  const loc = [team.city, team.state_prov, team.country].filter(Boolean).join(", ");
  const sponsors = team.name || "";
  // Parse sponsor list from the full team name (pipe-separated)
  const sponsorList = sponsors.split("/").map(s => s.trim()).filter(Boolean).slice(0, 8);

  card.innerHTML = `
    <div style="display:flex;gap:0;min-height:100px">
      ${photoUrl ? `
        <div style="width:120px;flex-shrink:0;background:var(--surface-100)">
          <img src="${photoUrl}" alt="Team ${TEAM_NUMBER}" loading="lazy"
               style="width:100%;height:100%;object-fit:cover;display:block"/>
        </div>` : ""}
      <div style="padding:16px 16px 12px;flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <div>
            <span style="font-size:1.5rem;font-weight:900;color:var(--primary-500)">${TEAM_NUMBER}</span>
            <span style="font-size:1.1rem;font-weight:700;color:var(--surface-950);margin-left:8px">${team.nickname || team.name}</span>
          </div>
          <a href="https://www.thebluealliance.com/team/${TEAM_NUMBER}" target="_blank" rel="noopener"
             class="cs-btn cs-btn-ghost cs-btn-sm" style="flex-shrink:0">
            <span class="material-symbols-outlined" style="font-size:14px">open_in_new</span> TBA
          </a>
        </div>
        ${loc ? `<div style="font-size:0.82rem;color:var(--surface-500);display:flex;align-items:center;gap:4px;margin-bottom:4px">
          <span class="material-symbols-outlined" style="font-size:14px">location_on</span>${loc}
        </div>` : ""}
        ${team.rookie_year ? `<div style="font-size:0.78rem;color:var(--surface-400)">Rookie: ${team.rookie_year}</div>` : ""}
        ${team.school_name ? `<div style="font-size:0.78rem;color:var(--surface-400);margin-top:2px">${team.school_name}</div>` : ""}
      </div>
    </div>
    ${sponsorList.length > 1 ? `
    <div style="padding:10px 16px;border-top:1px solid var(--surface-100)">
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--surface-400);margin-bottom:6px">Sponsors</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${sponsorList.map(sp => `<span style="font-size:0.75rem;background:var(--surface-100);color:var(--surface-600);padding:2px 8px;border-radius:99px">${sp}</span>`).join("")}
      </div>
    </div>` : ""}
  `;
}

function renderEPA(sbYear) {
  const card = document.getElementById("epaCard");
  if (!sbYear || !sbYear.epa) { card.style.display = "none"; return; }
  card.style.display = "";
  document.getElementById("epaStatboticsLink").href = `https://www.statbotics.io/teams/${TEAM_NUMBER}`;

  const epa = sbYear.epa;
  // Statbotics v3: epa.breakdown has flat numbers; epa.total_points is {mean, sd}
  const bd = epa.breakdown || {};
  const total     = bd.total_points   ?? epa.total_points?.mean  ?? null;
  const autoVal   = bd.auto_points    ?? epa.auto_points?.mean   ?? null;
  const teleopVal = bd.teleop_points  ?? epa.teleop_points?.mean ?? null;
  const endgameVal= bd.endgame_points ?? epa.endgame_points?.mean ?? null;
  const maxEPA    = Math.max(total || 0, 1);

  const fmtSb = v => window.CS.statbotics.fmtEPA(v, 1);
  const bar = (val, max, color) => {
    const pct = Math.min(100, Math.round((val / max) * 100));
    return `<div class="epa-bar-bg"><div class="epa-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
  };

  document.getElementById("epaContent").innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;text-align:center">
      <div class="cs-card cs-card-sm" style="flex:1;min-width:80px;padding:10px 8px">
        <div style="font-size:1.5rem;font-weight:800;color:var(--primary-500)">${fmtSb(total)}</div>
        <div style="font-size:0.7rem;color:var(--surface-400);text-transform:uppercase;letter-spacing:.04em">Total EPA</div>
      </div>
      <div class="cs-card cs-card-sm" style="flex:1;min-width:70px;padding:10px 8px">
        <div style="font-size:1.3rem;font-weight:700;color:#60a5fa">${fmtSb(autoVal)}</div>
        <div style="font-size:0.7rem;color:var(--surface-400);text-transform:uppercase;letter-spacing:.04em">Auto</div>
      </div>
      <div class="cs-card cs-card-sm" style="flex:1;min-width:70px;padding:10px 8px">
        <div style="font-size:1.3rem;font-weight:700;color:#c084fc">${fmtSb(teleopVal)}</div>
        <div style="font-size:0.7rem;color:var(--surface-400);text-transform:uppercase;letter-spacing:.04em">Teleop</div>
      </div>
      <div class="cs-card cs-card-sm" style="flex:1;min-width:70px;padding:10px 8px">
        <div style="font-size:1.3rem;font-weight:700;color:#fbbf24">${fmtSb(endgameVal)}</div>
        <div style="font-size:0.7rem;color:var(--surface-400);text-transform:uppercase;letter-spacing:.04em">Endgame</div>
      </div>
    </div>
    ${total != null ? `
    <div style="display:flex;flex-direction:column;gap:8px">
      ${autoVal != null ? `
      <div style="display:flex;align-items:center;gap:10px;font-size:0.8rem">
        <span style="width:60px;color:var(--surface-500)">Auto</span>
        ${bar(autoVal, total, "#60a5fa")}
        <span style="width:36px;text-align:right;font-weight:600;color:#60a5fa">${fmtSb(autoVal)}</span>
      </div>` : ""}
      ${teleopVal != null ? `
      <div style="display:flex;align-items:center;gap:10px;font-size:0.8rem">
        <span style="width:60px;color:var(--surface-500)">Teleop</span>
        ${bar(teleopVal, total, "#c084fc")}
        <span style="width:36px;text-align:right;font-weight:600;color:#c084fc">${fmtSb(teleopVal)}</span>
      </div>` : ""}
      ${endgameVal != null ? `
      <div style="display:flex;align-items:center;gap:10px;font-size:0.8rem">
        <span style="width:60px;color:var(--surface-500)">Endgame</span>
        ${bar(endgameVal, total, "#fbbf24")}
        <span style="width:36px;text-align:right;font-weight:600;color:#fbbf24">${fmtSb(endgameVal)}</span>
      </div>` : ""}
    </div>` : ""}
    ${sbYear.record ? `
    <div style="margin-top:12px;font-size:0.78rem;color:var(--surface-500)">
      ${YEAR} Record: <strong style="color:var(--surface-700)">${sbYear.record.wins ?? "?"}W – ${sbYear.record.losses ?? "?"}L – ${sbYear.record.ties ?? "?"}T</strong>
      ${epa.ranks?.total?.rank ? ` · Rank <strong>#${epa.ranks.total.rank}</strong>` : ""}
      ${epa.ranks?.total?.percentile != null ? ` · Top <strong>${((1 - epa.ranks.total.percentile) * 100).toFixed(1)}%</strong>` : ""}
    </div>` : ""}
  `;
}

async function loadUpcomingMatches(team) {
  // Get all 2026 events for the team, find events that haven't happened yet, get next 3 matches
  const events = await window.CS.tba.getTeamEvents(TEAM_NUMBER, YEAR);
  if (!events || !events.length) return;

  const now = new Date();
  const upcoming = events
    .filter(e => e.end_date && new Date(e.end_date) >= now)
    .sort((a, b) => (a.start_date || "").localeCompare(b.start_date || ""));

  if (!upcoming.length) return;

  // Fetch matches for the soonest event
  const soonestEvent = upcoming[0];
  const matches = await window.CS.tba.getTeamEventMatches(TEAM_NUMBER, soonestEvent.key);
  if (!matches || !matches.length) return;

  // Filter unplayed matches (no score yet)
  const unplayed = matches
    .filter(m => (m.alliances?.red?.score ?? -1) === -1 || (m.alliances?.red?.score ?? -1) === null)
    .sort((a, b) => (a.time || a.predicted_time || 0) - (b.time || b.predicted_time || 0))
    .slice(0, 3);

  if (!unplayed.length) return;

  const section = document.getElementById("upcomingSection");
  section.style.display = "";

  document.getElementById("upcomingList").innerHTML = unplayed.map(m => {
    const red  = (m.alliances?.red?.team_keys  || []).map(k => k.replace("frc",""));
    const blue = (m.alliances?.blue?.team_keys || []).map(k => k.replace("frc",""));
    const label = m.comp_level === "qm" ? `Q${m.match_number}` : `${(m.comp_level||"").toUpperCase()} ${m.set_number}-${m.match_number}`;
    const time = m.predicted_time || m.time;
    const timeStr = time ? new Date(time * 1000).toLocaleString(undefined, { weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" }) : "TBD";
    const onRed = red.includes(String(TEAM_NUMBER));
    return `
      <div class="cs-card cs-card-sm" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-weight:700;color:var(--surface-700)">${label}</span>
            <span class="${onRed ? 'cs-alliance-red' : 'cs-alliance-blue'}" style="font-size:0.72rem;font-weight:700">${onRed ? "RED" : "BLUE"}</span>
          </div>
          <span style="font-size:0.75rem;color:var(--surface-400)">${timeStr}</span>
        </div>
        <div style="font-size:0.8rem">
          <span style="color:#f87171">${red.map(n => `<a href="team.html?number=${n}" class="team-link red${n==TEAM_NUMBER?' highlight':''}">${n}</a>`).join(" ")}</span>
          <span style="color:var(--surface-400);margin:0 6px">vs</span>
          <span style="color:#60a5fa">${blue.map(n => `<a href="team.html?number=${n}" class="team-link blue${n==TEAM_NUMBER?' highlight':''}">${n}</a>`).join(" ")}</span>
        </div>
        <div style="font-size:0.75rem;color:var(--surface-400);margin-top:4px">${soonestEvent.short_name || soonestEvent.name}</div>
      </div>
    `;
  }).join("");
}

// ─────────────────────────────────────────────────────────────────
// Team events
// ─────────────────────────────────────────────────────────────────
async function loadTeamEvents() {
  const events = await window.CS.tba.getTeamEvents(TEAM_NUMBER, YEAR);
  const el = document.getElementById("teamEvents");
  const statsFilter = document.getElementById("statsEventFilter");
  const matchFilter = document.getElementById("matchEventFilter");

  if (!events || !events.length) {
    el.innerHTML = '<div class="cs-empty">No 2026 events found.</div>';
    return;
  }
  teamEvents2026 = events.sort((a, b) => (a.start_date || "").localeCompare(b.start_date || ""));
  el.innerHTML = teamEvents2026.map(e => {
    const loc = [e.city, e.state_prov].filter(Boolean).join(", ");
    const dateStr = window.CS.ui.fmtDate(e.start_date);
    const isChamp = (e.event_type_string || "").includes("Championship");
    return `
      <a href="event.html?key=${e.key}" style="text-decoration:none">
        <div class="cs-card cs-card-sm" style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px">
          <div>
            <div style="font-weight:600;font-size:0.9rem">${e.short_name || e.name}</div>
            <div style="font-size:0.75rem;color:var(--surface-500)">${dateStr}${loc ? " · " + loc : ""}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            ${isChamp ? `<span class="cs-pill cs-pill-yellow" style="font-size:0.68rem">CMP</span>` : ""}
            <span class="cs-event-chip" style="font-size:0.72rem">${e.key}</span>
          </div>
        </div>
      </a>
    `;
  }).join("");

  const opts = teamEvents2026.map(e => `<option value="${e.key}">${e.short_name || e.name} (${e.key})</option>`).join("");
  statsFilter.innerHTML = '<option value="">All Events</option>' + opts;
  matchFilter.innerHTML = '<option value="">Select event…</option>' + opts;
}

// ─────────────────────────────────────────────────────────────────
// Scout stats
// ─────────────────────────────────────────────────────────────────
async function loadScoutStats() {
  const db = window.CS.db;
  if (!db) return;
  const eventKey = document.getElementById("statsEventFilter")?.value || "";
  let query = db.from("scout_submissions")
    .select("event_key,match_number,answers,reliability_score,created_at,owner_id")
    .eq("team_number", TEAM_NUMBER)
    .order("created_at", { ascending: false });
  if (eventKey) query = query.eq("event_key", eventKey);
  const { data: subs } = await query;

  // Fetch usernames separately (avoids FK join requirement)
  if (subs && subs.length) {
    const ownerIds = [...new Set(subs.map(s => s.owner_id).filter(Boolean))];
    if (ownerIds.length) {
      const { data: profiles } = await db.from("profiles").select("id,username").in("id", ownerIds);
      const map = {};
      if (profiles) profiles.forEach(p => { map[p.id] = p.username; });
      subs.forEach(s => { s._username = map[s.owner_id] || "scout"; });
    }
  }

  const el = document.getElementById("scoutStats");
  if (!subs || !subs.length) {
    el.innerHTML = '<div class="cs-empty">No scouting submissions for this team yet.</div>';
    return;
  }

  const schema = window.CS.schema2026;
  const allFields = schema.sections.flatMap(s => s.fields).filter(f => f.type !== "text");
  const agg = window.CS.reliability.aggregateTeamStats(subs, allFields);

  const keyMetrics = [
    { label: "Avg Auto FUEL",   key: "auto_fuel_scored",     suffix: "" },
    { label: "Avg Teleop FUEL", key: "teleop_fuel_scored",   suffix: "" },
    { label: "Left Zone",       key: "auto_left_zone",       suffix: "%", isPct: true },
    { label: "Climb",           key: "endgame_climb_level",  suffix: "", isClimb: true },
    { label: "Defense",         key: "teleop_played_defense",suffix: "%", isPct: true },
    { label: "Robot Died",      key: "post_robot_died",      suffix: "%", isPct: true },
  ];

  const totalFuelAvg = ((agg.auto_fuel_scored?.mean || 0) + (agg.teleop_fuel_scored?.mean || 0)).toFixed(1);

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px">
      <div class="cs-card" style="text-align:center;background:var(--primary-950);border-color:var(--primary-800)">
        <div style="font-size:2rem;font-weight:800;color:var(--primary-500)">${totalFuelAvg}</div>
        <div style="font-size:0.7rem;color:var(--primary-400);text-transform:uppercase;letter-spacing:.05em">Avg Total FUEL</div>
      </div>
      ${keyMetrics.map(m => {
        const d = agg[m.key];
        let val = d?.mean ?? d?.value ?? null;
        let display = "—";
        if (val !== null && val !== undefined) {
          if (m.isClimb) display = window.CS.ui.climbLabel(Math.round(val));
          else if (m.isPct) display = Math.round(val * 100) + "%";
          else display = Number(val).toFixed(1) + m.suffix;
        }
        const conf = d?.confidence;
        return `
          <div class="cs-card" style="text-align:center">
            <div style="font-size:1.3rem;font-weight:700;color:var(--surface-950)">${display}</div>
            <div style="font-size:0.7rem;color:var(--surface-500);text-transform:uppercase;letter-spacing:.04em;margin-top:2px">${m.label}</div>
            ${conf != null ? `<div class="cs-reliability-bar" style="margin-top:6px"><div class="cs-reliability-fill" style="width:${Math.round(conf*100)}%"></div></div>` : ""}
          </div>
        `;
      }).join("")}
    </div>
    <div style="font-size:0.8rem;color:var(--surface-400);margin-bottom:12px">Based on ${subs.length} submission${subs.length !== 1 ? "s" : ""}</div>

    <h3 class="cs-section-title" style="margin-top:16px">Recent Submissions</h3>
    ${subs.slice(0, 10).map(s => `
      <div class="cs-card cs-card-sm" style="margin-bottom:8px;font-size:0.85rem">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-weight:600">${s.event_key} Q${s.match_number}</span>
          <span style="color:var(--surface-400);font-size:0.75rem">${s._username || "scout"}</span>
        </div>
        <div style="color:var(--surface-600);font-size:0.8rem">
          Auto: ${s.answers?.auto_fuel_scored ?? "—"} FUEL ·
          Teleop: ${s.answers?.teleop_fuel_scored ?? "—"} FUEL ·
          Climb: ${window.CS.ui.climbLabel(s.answers?.endgame_climb_level)}
        </div>
      </div>
    `).join("")}
  `;
}

// ─────────────────────────────────────────────────────────────────
// Match history — TBA style
// ─────────────────────────────────────────────────────────────────
async function loadTeamMatches() {
  const eventKey = document.getElementById("matchEventFilter").value;
  if (!eventKey) return;
  const el = document.getElementById("matchesList");
  el.innerHTML = `<div style="padding:30px;text-align:center;color:var(--surface-400)">
    <span class="material-symbols-outlined" style="font-size:32px;display:block;margin-bottom:6px">hourglass_top</span>Loading…</div>`;

  const [matches, rankings] = await Promise.all([
    window.CS.tba.getTeamEventMatches(TEAM_NUMBER, eventKey),
    window.CS.tba.getEventRankings(eventKey),
  ]);

  if (!matches || !matches.length) {
    el.innerHTML = '<div class="cs-empty">No matches found for this event.</div>';
    return;
  }

  // Find rank & record from rankings
  let rankText = "";
  if (rankings?.rankings) {
    const r = rankings.rankings.find(r => r.team_key === `frc${TEAM_NUMBER}`);
    if (r) {
      const rec = r.record;
      rankText = `Rank #${r.rank} · ${rec ? `${rec.wins}W–${rec.losses}L–${rec.ties}T` : ""}`;
    }
  }

  // Separate quals vs playoffs
  const quals = matches.filter(m => m.comp_level === "qm").sort((a, b) => a.match_number - b.match_number);
  const playoffs = matches.filter(m => m.comp_level !== "qm").sort((a, b) => {
    const order = { sf: 0, f: 1 };
    return (order[a.comp_level] ?? 2) - (order[b.comp_level] ?? 2) || a.set_number - b.set_number || a.match_number - b.match_number;
  });

  const eventName = teamEvents2026.find(e => e.key === eventKey)?.short_name || eventKey;

  let html = "";
  if (rankText) {
    html += `<div style="font-size:0.82rem;color:var(--primary-400);font-weight:600;margin-bottom:10px;padding:0 4px">${rankText} at ${eventName}</div>`;
  }

  // Table header
  const tableHeader = `
    <div class="match-row" style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--surface-400);border-bottom:1px solid var(--surface-200);padding-bottom:6px">
      <span>Match</span><span>Red Alliance</span><span>Blue Alliance</span><span style="text-align:right">Score</span>
    </div>`;

  if (quals.length) {
    html += `<div class="cs-card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div class="event-section-hdr">Qualifications <span>${quals.length} matches</span></div>
      ${tableHeader}
      ${quals.map(m => renderMatchRow(m)).join("")}
    </div>`;
  }

  if (playoffs.length) {
    html += `<div class="cs-card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div class="event-section-hdr">Playoffs</div>
      ${tableHeader}
      ${playoffs.map(m => renderMatchRow(m)).join("")}
    </div>`;
  }

  el.innerHTML = html;
}

function renderMatchRow(m) {
  const red  = (m.alliances?.red?.team_keys  || []).map(k => k.replace("frc",""));
  const blue = (m.alliances?.blue?.team_keys || []).map(k => k.replace("frc",""));
  const rs = m.alliances?.red?.score  ?? -1;
  const bs = m.alliances?.blue?.score ?? -1;
  const played = rs !== -1 && rs !== null && bs !== -1 && bs !== null;

  const onRed  = red.includes(String(TEAM_NUMBER));
  const onBlue = blue.includes(String(TEAM_NUMBER));

  let scoreClass = "";
  if (played) {
    const myScore = onRed ? rs : bs;
    const opScore = onRed ? bs : rs;
    if (myScore > opScore)      scoreClass = "win";
    else if (myScore < opScore) scoreClass = "loss";
    else                        scoreClass = "tie";
  }

  const levelMap = { qm: "Q", sf: "SF", f: "F" };
  const prefix = levelMap[m.comp_level] || m.comp_level?.toUpperCase() || "?";
  const label = m.comp_level === "qm"
    ? `Q${m.match_number}`
    : `${prefix}${m.set_number}-${m.match_number}`;

  const videoKey = m.videos?.[0];
  const videoUrl = videoKey?.type === "youtube" ? `https://youtu.be/${videoKey.key}` : null;

  const matchPageUrl = `match.html?key=${encodeURIComponent(m.key)}`;

  const renderTeams = (teamNums, color) => teamNums.map(n =>
    `<a href="team.html?number=${n}" class="team-link ${color}${n == TEAM_NUMBER ? ' highlight' : ''}">${n}</a>`
  ).join(" ");

  const scoreDisplay = played ? `${rs}–${bs}` : "—";

  return `
    <div class="match-row">
      <div style="display:flex;align-items:center;gap:4px">
        ${videoUrl ? `<a href="${videoUrl}" target="_blank" rel="noopener" class="video-icon" title="Watch on YouTube">
          <span class="material-symbols-outlined" style="font-size:16px">play_circle</span></a>` : ""}
        <a href="${matchPageUrl}" class="match-label" style="text-decoration:none;color:inherit">${label}</a>
      </div>
      <div class="alliance-cell">${renderTeams(red, "red")}</div>
      <div class="alliance-cell">${renderTeams(blue, "blue")}</div>
      <div class="score-cell ${scoreClass}">${scoreDisplay}</div>
    </div>
  `;
}
</script>
